<!DOCTYPE html>
<html lang="en" class="theme-dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" id="themeColor" content="#0f0f0f" />
<title>Vonder · Memory Graph (Topic) — 3D demo</title>
<style>
  :root {
    --bg0: #06070d;
    --bg1: #0c1020;
    --ink: #17181a;
    --sheet: #efeee9;   /* Vonder Paper White */
    --accent: #7d8aa8;
    --amber: #e08a37;
  }
  @font-face {
    font-family: 'GT Canon';
    font-weight: 400; font-style: normal; font-display: swap;
    src: url('gt-canon-regular.ttf') format('truetype');
  }
  @font-face {
    font-family: 'Zalando Sans';
    font-weight: 100 900; font-style: normal; font-display: swap;
    src: url('zalando-sans-var.woff2') format('woff2');
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%; width: 100%;
    overflow: hidden;
    font-family: "Zalando Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Helvetica Neue", sans-serif;
    color: #e9eaf0;
    overscroll-behavior: none;
  }
  #scene { position: fixed; inset: 0; touch-action: none; }
  #labels { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }

  /* ---- constant-size text capsules ---- */
  .cap {
    pointer-events: none;
    white-space: nowrap;
    border-radius: 999px;
    transform: translate(-50%, -50%);
    font-weight: 500;
    user-select: none;
    line-height: 1;
  }
  /* node pill (Figma "Linux" pill): dark translucent capsule, light hairline, original casing */
  .cap.node { font-size: 11px; padding: 5px 12px; letter-spacing: .1px; }
  /* category pill (Figma PillsMG): icon 14 + UPPERCASE name + 40% count on a white@10% capsule */
  .cap.cat  { font-size: 11px; font-weight: 500; padding: 5px 12px; display: flex; align-items: center; gap: 5px;
              text-transform: uppercase; letter-spacing: -.1px; }
  .cap.cat .ic { width: 14px; height: 14px; flex: 0 0 auto; display: flex; opacity: .9; }
  .cap.cat .ic svg { width: 100%; height: 100%; }
  .cap.cat .cnt { font-weight: 500; font-size: 11px; opacity: .4; }

  /* Figma black */
  html.theme-dark, body.theme-dark { background: #0f0f0f; }
  body.theme-dark .cap.node { color:rgba(255,255,255,.92); background:#292929; border:1px solid rgba(255,255,255,.18); }
  body.theme-dark .cap.cat  { color:#fff; background:#292929; border:1px solid rgba(255,255,255,.18); }
  body.theme-dark .cap.selected { border-color: rgba(255,255,255,.65); background: rgba(15,15,15,.9); }
  /* paper light (#EFEEE9) */
  html.theme-light, body.theme-light { background: #efeee9; }
  body.theme-light .cap.node { color:#26282d; background:#fbfaf7; border:1px solid rgba(40,38,32,.16); box-shadow:0 1px 3px rgba(60,55,45,.10); }
  body.theme-light .cap.cat  { color:#17181a; background:rgba(15,15,15,.08); border:1px solid transparent; }
  body.theme-light .cap.selected { border-color: rgba(15,15,15,.6); background:#fff; }

  /* ---- control panel ---- */
  #panel {
    position: fixed; top: 0; left: 0; right: 0;
    padding: calc(env(safe-area-inset-top) + 54px) 12px 12px;
    background: linear-gradient(180deg, rgba(6,7,13,.92), rgba(6,7,13,0));
    z-index: 20; transition: transform .28s ease;
  }
  #datasetTabs {
    display: flex; gap: 2px; padding: 3px; width: max-content;
    background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.10);
    border-radius: 12px;
  }
  #datasetTabs button {
    border: 0; background: transparent; color: #aeb1c0; font-family: inherit;
    font-size: 12px; font-weight: 600; padding: 7px 16px; border-radius: 9px; cursor: pointer;
  }
  #datasetTabs button.on { background: var(--accent); color: #fff; }
  #panel.hidden { transform: translateY(-102%); }
  .row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }

  /* ---- top bar (Figma: centred uppercase title + search at right; double-tap title = console) ---- */
  #topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 25;
    height: calc(env(safe-area-inset-top) + 52px);
    padding: env(safe-area-inset-top) 6px 0;
    display: flex; align-items: center; justify-content: center; pointer-events: none;
    background: #0f0f0f;                          /* solid mask behind the title (per Figma toolbar) */
  }
  #topbar::after {                                 /* soft tail so the graph fades out under the bar */
    content: ''; position: absolute; top: 100%; left: 0; right: 0; height: 38px; pointer-events: none;
    background: linear-gradient(180deg, #0f0f0f, rgba(15,15,15,0));
  }
  body.theme-light #topbar { background: #efeee9; }
  body.theme-light #topbar::after { background: linear-gradient(180deg, #efeee9, rgba(239,238,233,0)); }
  #tbTitle {
    font-size: 12px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase;
    color: #fff; pointer-events: auto; user-select: none; -webkit-user-select: none; padding: 10px 14px;
  }
  #searchBtn {
    position: absolute; right: 8px; top: calc(env(safe-area-inset-top) + 4px);
    width: 44px; height: 44px; border: 0; background: transparent; color: #fff;
    display: flex; align-items: center; justify-content: center; cursor: pointer; pointer-events: auto;
  }
  body.theme-light #tbTitle, body.theme-light #searchBtn { color: #17181a; }

  /* ---- detail bottom sheet ---- */
  #sheet {
    /* centred via left/right+margin (NOT translateX) so the FULL detent can be transform: none —
       iOS suppresses scroll gestures inside a transformed/animating fixed subtree for a beat,
       which read as "can't scroll for ~2s after expanding". At rest at full there is no transform. */
    position: fixed; left: 0; right: 0; bottom: 0; margin: 0 auto; transform: translateY(110%);
    width: 100%; max-width: 460px; z-index: 30;
    background: var(--sheet); color: var(--ink);
    border-radius: 44px 44px 0 0;   /* measured off the Figma sheet corner */
    transition: transform .34s cubic-bezier(.22,1,.36,1);
    /* the element is always FULL-detent tall ("almost fullscreen"); the detents just slide it */
    height: calc(100vh  - env(safe-area-inset-top) - 44px);
    height: calc(100dvh - env(safe-area-inset-top) - 44px);
    --sheet-half: 42vh;                    /* the default HALF detent — never covers the node parked at 1/3 */
    display: flex; flex-direction: column; overflow: hidden; padding: 0;
  }
  #sheet.open      { transform: translateY(calc(100% - var(--sheet-half))); }   /* half: top 42vh visible */
  #sheet.open.full { transform: none; }                                         /* full: NO transform at rest */
  #sheetHead {
    flex: 0 0 auto; position: relative; padding: 0 min(20px, 5vw) 2px;
    touch-action: none; user-select: none; -webkit-user-select: none; cursor: grab;
  }
  #sheetHead .gwrap { display: flex; justify-content: center; padding: 12px 0 0; }
  #sheetHead .gbar  { width: 144px; height: 5px; border-radius: 3px; background: #0f0f0f; }   /* measured: 144×5, 12px below the edge */
  #sheetBody {
    /* NOTE: no -webkit-overflow-scrolling:touch — legacy iOS scroller + transformed fixed ancestor
       leaves the below-the-fold part of the body untouchable after sliding to full. */
    flex: 1 1 auto; overflow-y: auto; overscroll-behavior: contain;
    padding: 4px min(20px, 5vw) calc(env(safe-area-inset-bottom) + 26px);
  }
  #sheet.open:not(.full) #sheetBody { touch-action: none; }   /* at half, body drags the SHEET — no native scroll race */
  #sheet h1 {
    /* Figma: centred serif title in the node's ORIGINAL casing (only categories force uppercase) */
    font-family: "GT Canon", Georgia, "Times New Roman", serif; font-weight: 500;
    font-size: 26px; letter-spacing: .2px; text-align: center; margin: 29px 4px 28px; color: #0f0f0f;
    overflow-wrap: anywhere;
  }
  /* category sheet: sans count title + uppercase category subtitle (Figma "25 memories / ORGANIZATION") */
  #sheet h1.cnt { font-family: inherit; font-weight: 600; font-size: 26px; letter-spacing: -.3px; margin-bottom: 8px; }
  #sSub { display: none; text-align: center; font-size: 12px; font-weight: 600; letter-spacing: 1px;
    text-transform: uppercase; color: #696866; margin: 0 4px 24px; }
  #sSub.show { display: block; }
  #sheet .meta { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 22px; }
  #sheet .mpill { font-size: 11.5px; font-weight: 600; padding: 5px 11px; border-radius: 999px; display: flex; align-items: center; gap: 6px; background: #e7e4dd; color: #3a3c42; }
  #sheet .mpill .swatch { width: 8px; height: 8px; border-radius: 50%; }
  #sheet .secttl { font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: #0f0f0f; margin: 0 0 18px; }
  /* Figma: SUMMARY body is the serif reading face */
  #sheet .summary { font-family: "GT Canon", Georgia, "Times New Roman", serif; font-size: 16px; color: #71706e; line-height: 1.28; white-space: pre-wrap; margin-bottom: 22px; }
  #sheet .rel { margin-top: 2px; display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 40px; }
  /* Figma: RELATED pills are FLAT warm-white capsules — no border, no shadow (measured) */
  #sheet .rel .pill { font-size: 13px; font-weight: 500; background: #f9f8f6; color: #2c2c2c; padding: 12px 16px;
    border: 0; border-radius: 999px; line-height: 1.05;
    max-width: 100%; overflow-wrap: anywhere; }
  #sheet .rel .rpill { cursor: pointer; }
  #sheet .rel .rpill:active { background: #eceae3; }
  #sheet .zoombtn {
    width: 100%; margin: 0 0 22px; padding: 11px; border: 0; border-radius: 12px; cursor: pointer;
    background: var(--ink); color: #fff; font-family: inherit; font-size: 13px; font-weight: 600;
  }
  #sheet .nodelist { display: flex; flex-direction: column; }
  #sheet .noderow {
    display: flex; align-items: baseline; gap: 12px; padding: 19px 0; cursor: pointer;
    border-top: 1px solid #d9d8d3;
  }
  #sheet .noderow:first-child { border-top: 0; }   /* design: no rule above the first row */
  #sheet .noderow:active { background: rgba(0,0,0,.04); }
  #sheet .noderow .rname { flex: 1; font-size: 15.5px; color: #0f0f0f; line-height: 1.35; overflow-wrap: anywhere; }
  #sheet .noderow .rcat { font-size: 11.5px; letter-spacing: .2px; color: #999; white-space: nowrap; }   /* Figma copy is lowercase: "2 connections" */

  /* light theme — keep the chrome light too so the whole background reads light */
  body.theme-light #panel { background: linear-gradient(180deg, rgba(239,238,233,.96), rgba(239,238,233,0)); }
  body.theme-light #datasetTabs { background: rgba(40,38,32,.06); border-color: rgba(40,38,32,.14); }
  body.theme-light #datasetTabs button { color:#8a857a; }
  body.theme-light #datasetTabs button.on { color:#fff; }

  /* search — Figma Action-Search screens (dark full-screen takeover; keyboard UI is the OS's) */
  #search { position: fixed; inset: 0; z-index: 50; display: none; flex-direction: column;
    padding: calc(env(safe-area-inset-top) + 10px) 20px 0; background: #0f0f0f; }
  #search.open { display: flex; }
  #search .srow { display: flex; gap: 4px; align-items: center; flex: 0 0 auto; }
  #searchBack { width: 40px; height: 44px; border: 0; background: transparent; color: #fff; flex: 0 0 auto;
    display: flex; align-items: center; justify-content: center; cursor: pointer; margin-left: -10px; }
  #search .sfield { position: relative; flex: 1; }
  #search input { width: 100%; height: 40px; font-size: 14px; letter-spacing: -.14px; padding: 0 46px 0 16px;
    border-radius: 999px; border: 0; background: rgba(255,255,255,.10); color: #fff;
    box-shadow: 0 14px 24px rgba(0,0,0,.05); font-family: inherit; outline: none; }
  #search input::placeholder { color: rgba(255,255,255,.4); }
  #search .sglass { position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
    color: rgba(255,255,255,.8); pointer-events: none; }
  #searchClear { position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    width: 36px; height: 36px; border: 0; background: transparent; color: rgba(255,255,255,.8);
    display: none; align-items: center; justify-content: center; cursor: pointer; }
  #search.typing .sglass { display: none; }
  #search.typing #searchClear { display: flex; }
  #searchBody { flex: 1; overflow-y: auto; overscroll-behavior: contain; }
  #search .sres { display: flex; align-items: baseline; gap: 12px; padding: 17px 2px; cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,.08); }
  #search .sres .rname { flex: 1; font-size: 15px; font-weight: 400; color: #fff;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #search .sres .rname b { font-weight: 700; }
  #search .sres .rcat { font-size: 10.5px; letter-spacing: .6px; text-transform: uppercase;
    color: rgba(255,255,255,.5); white-space: nowrap; }
  /* empty ("Find a Memory") + no-results states */
  #searchEmpty, #searchNone { display: none; flex-direction: column; align-items: center; text-align: center; padding-top: 52px; }
  #search.stateEmpty #searchEmpty { display: flex; }
  #search.stateNone  #searchNone  { display: flex; }
  #search .neb { width: 236px; height: 183px; mix-blend-mode: lighten; }
  #search .neb.small { width: 156px; height: 121px; }
  #search .neb img { width: 100%; height: 100%; object-fit: cover; }
  #searchEmpty h2 { font-family: "GT Canon", Georgia, "Times New Roman", serif; font-weight: 500; font-size: 24px; letter-spacing: -1.2px; color: #fff; margin: 33px 0 20px; }
  #searchEmpty p, #searchNone p { font-family: "GT Canon", Georgia, "Times New Roman", serif; font-size: 14px; letter-spacing: -.56px;
    color: #fff; line-height: 1.3; margin: 0; max-width: 252px; }
  #searchNone p { margin-top: 26px; }

  #loading {
    position: fixed; inset: 0; z-index: 40; background: #0f0f0f; pointer-events: none;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
  }
  #loading .ldGlyph { width: 46px; height: 42px; color: #fff; animation: ldBreath 1.5s ease-in-out infinite alternate; }
  @keyframes ldBreath { from { opacity: 0; } to { opacity: .4; } }
  #loading .ldErr { display: none; font-size: 13px; color: rgba(255,255,255,.55); text-align: center; line-height: 1.7; }
  #loading.err .ldGlyph { animation: none; opacity: .3; }
  #loading.err .ldErr { display: block; }
  #loading .ldTitle {                              /* same spot & style as the real top-bar title */
    position: absolute; top: 0; left: 0; right: 0; height: calc(env(safe-area-inset-top) + 52px);
    padding-top: env(safe-area-inset-top); display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: #fff;
  }
  body.theme-light #loading .ldTitle { color: #17181a; }
  /* search stays hidden through loading + the boot intro, then fades in */
  #searchBtn { opacity: 0; pointer-events: none !important; transition: opacity .6s; }
  body.ready #searchBtn { opacity: 1; pointer-events: auto !important; }
  body.theme-light #loading { background: #efeee9; }
  body.theme-light #loading .ldGlyph { color: #0f0f0f; }
  body.theme-light #loading .ldErr { color: rgba(15,15,15,.55); }
  #labels { transition: opacity .6s; }
</style>
</head>

  <canvas id="scene"></canvas>
  <div id="labels"></div>

  <div id="topbar">
    <div id="tbTitle">Memory Graph</div>
    <button id="searchBtn" aria-label="Search">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>

  <div id="search">

      </button>
      <div class="sfield">
        <input id="searchInput" type="text" placeholder="Search" autocomplete="off" autocapitalize="off" spellcheck="false" />

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
import { LineSegments2 } from 'three/addons/lines/LineSegments2.js';
import { LineSegmentsGeometry } from 'three/addons/lines/LineSegmentsGeometry.js';
import { LineMaterial } from 'three/addons/lines/LineMaterial.js';

/* ----------------------------------------------------------------------
 * 1. Config — category derivation & colours
 * -------------------------------------------------------------------- */
const UNIT = 60;
const DATASETS = [
  { key:'light',  label:'Light',  url:'mockdata_light.md' },
  { key:'medium', label:'Medium', url:'mockdata_medium.md' },
  { key:'heavy',  label:'Heavy',  url:'mockdata_heavy.md' },
];
let curDataset = 'medium';

// entity_type → category. Person/Organization/Place use the type name directly;
// Topic uses its attributes.category; everything else (generic entities) → "Others".
const TYPE_CAT = { Person:'Person', Organization:'Organization', Place:'Place' };
function deriveCategoryKey(n){
  const t = n.entity_type;
  if (TYPE_CAT[t]) return t;
  if (t === 'Topic') return (n.attributes && n.attributes.category) || 'Others';
  return 'Others';
}
const titleCase = s => s.charAt(0).toUpperCase() + s.slice(1);
function displayName(key){ return (TYPE_CAT[key] || key === 'Others') ? key : titleCase(key); }

// calm "intelligence" palettes — muted, low-chroma. dark + light(#EFEEE9).
const THEMES = {
  dark: {
    bg: 0x0f0f0f, fog: 0.0008,
    nodeDot: 0xffffff,                     // Figma: every node is a white glowing dot (no per-category colour)
    line: 0xffffff, lineOpacity: 0.22, hierOpacity: 0.09,   // design lines are WHITE at low alpha — no colour cast
    lineHi: 0xffffff, lineHiOpacity: 0.8,
    nodeEmissive: 0.85, catEmissive: 0.95,
    glow: true, glowOpacity: 0.30, glowBlend: THREE.AdditiveBlending,
    star: true, starColor: 0x3a3d48, starOpacity: 0.5,
    cat:    { Person:'#8198bd', Organization:'#c08aa2', Place:'#82ac99', Others:'#9a9ca0' },
    topics: ['#c0a875','#929ec8','#86b0a0','#c89a86','#a892b6','#8ab0c0','#c4b486','#9aa6c4'],
  },
  light: {
    bg: 0xefeee9, fog: 0.00055,
    nodeDot: 0x17181a,
    line: 0x8a8170, lineOpacity: 0.32, hierOpacity: 0.16,
    lineHi: 0x0f0f0f, lineHiOpacity: 0.8,
    nodeEmissive: 0.0, catEmissive: 0.0,
    glow: false, glowOpacity: 0.0, glowBlend: THREE.NormalBlending,
    star: false, starColor: 0xcfcabd, starOpacity: 0.0,
    cat:    { Person:'#566d92', Organization:'#8f5f78', Place:'#4f7d68', Others:'#86837c' },
    topics: ['#9c8246','#5f6e9e','#4f8270','#a06a52','#7a5f8c','#5f8290','#8a7a3e','#566486'],
  },
};
let themeKey = 'dark', theme = THEMES.dark, lastRaw = null;

// fibonacci point on the unit sphere (idx may be fractional; arg is clamped)
function fibDir(idx, count){
  const k = idx + 0.5;
  const c = Math.max(-1, Math.min(1, 1 - 2 * k / count));
  const phi = Math.acos(c);
  const th  = Math.PI * (1 + Math.sqrt(5)) * k;
  return new THREE.Vector3(Math.sin(phi)*Math.cos(th), Math.cos(phi), Math.sin(phi)*Math.sin(th));
}
// deterministic 0..1 from a string (stable per-node jitter)
function hash01(s){ let h=2166136261; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619); } return ((h>>>0)%100000)/100000; }

/* ----------------------------------------------------------------------
 * 2. Parse the data source into categories + edges (run once on load)
 * -------------------------------------------------------------------- */
let RAW = null;   // { cats, edges:[{a,b}], allNodes, byId, groupId }

function parseSource(raw){
  const byId = new Map();
  (raw.nodes || []).forEach(n => byId.set(n.id, n));

  const groups = new Map();
  (raw.nodes || []).forEach(n => {
    const key = deriveCategoryKey(n);
    n._catKey = key; n._jit = hash01(n.id);
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(n);
  });

  // order: structural types first, then topic categories by size, Others last
  const rank = k => k === 'Others' ? 99 : (TYPE_CAT[k] ? 0 : 1);
  const keys = [...groups.keys()].sort((a,b) => rank(a)-rank(b) || groups.get(b).length-groups.get(a).length);
  // place Person LAST → it lands on the −Y (bottom) fibonacci slot, so people sit low in space
  const pIdx = keys.indexOf('Person');
  if (pIdx >= 0) { keys.splice(pIdx, 1); keys.push('Person'); }

  let ti = 0;
  const cats = keys.map(key => {
    const color = theme.cat[key] || theme.topics[ti++ % theme.topics.length];
    const cat = { id:'c_'+key, key, name: displayName(key), color, nodes: groups.get(key), pos: null };
    cat.nodes.forEach(n => { n.color = color; n.catName = cat.name; });
    return cat;
  });

  const edges = (raw.edges || [])
    .filter(e => byId.has(e.source) && byId.has(e.target) && e.source !== e.target)
    .map(e => ({ a: byId.get(e.source), b: byId.get(e.target) }));

  return { cats, edges, allNodes: raw.nodes || [], byId, groupId: raw.group_id };
}

/* ----------------------------------------------------------------------
 * 3. Layout — analytic placement from the parsed data (positions only)
 * -------------------------------------------------------------------- */
// Layout — analytic clusters (unchanged from the original demo). ONE exception: the
// "Others" bucket isn't a real theme, so instead of giving it its own cluster we scatter
// each Others node next to the real node(s) it connects to (edge-based), so it reads as
// "loose context floating around the things it relates to".
function buildData(spread){
  const numCats = RAW.cats.length;
  const Rcat = UNIT * spread * (1.2 + 0.55 * Math.sqrt(numCats));
  let maxRloc = 1;

  RAW.cats.forEach((cat, i) => {
    const dir = fibDir(i, numCats);
    if (cat.key === 'Others') return;                    // placed separately (scattered) below
    cat.pos = dir.clone().multiplyScalar(Rcat);
    const n = cat.nodes.length;
    const rloc = UNIT * spread * (0.45 + 0.16 * Math.sqrt(Math.max(n,1)));
    cat.nodes.forEach((node, j) => {
      const local = fibDir(j, n).multiplyScalar(rloc * (0.6 + 0.4 * node._jit));
      node.pos = cat.pos.clone().add(local).addScaledVector(dir, rloc * 0.35);
      maxRloc = Math.max(maxRloc, node.pos.distanceTo(cat.pos));
    });
  });

  // Others: place each node around the nodes it links to (no cluster, no anchor/label).
  const others = RAW.cats.find(c => c.key === 'Others');
  if (others){
    const nbrs = new Map();
    RAW.edges.forEach(({a,b}) => {
      if (a._catKey === 'Others' && b._catKey !== 'Others'){ if(!nbrs.has(a)) nbrs.set(a,[]); nbrs.get(a).push(b); }
      if (b._catKey === 'Others' && a._catKey !== 'Others'){ if(!nbrs.has(b)) nbrs.set(b,[]); nbrs.get(b).push(a); }
    });
    others.nodes.forEach((node, k) => {
      const nb = nbrs.get(node);
      if (nb && nb.length){
        const c = new THREE.Vector3(); nb.forEach(o => c.add(o.pos)); c.multiplyScalar(1/nb.length);
        const jit = new THREE.Vector3(node._jit-0.5, hash01(node.id+'y')-0.5, hash01(node.id+'z')-0.5).multiplyScalar(UNIT*spread*1.0);
        node.pos = c.add(jit);                            // sit just beside its related node(s)
      } else {
        node.pos = fibDir(k + 0.5, others.nodes.length + 1).multiplyScalar(Rcat * 1.12);  // unconnected → drift to the rim
      }
    });
    others.pos = null;
  }

  // recenter so the graph's centroid sits at the origin → rotation pivots on the true centre
  const c = new THREE.Vector3();
  RAW.allNodes.forEach(n => c.add(n.pos)); c.multiplyScalar(1 / Math.max(1, RAW.allNodes.length));
  RAW.allNodes.forEach(n => n.pos.sub(c));
  RAW.cats.forEach(cat => { if (cat.pos) cat.pos.sub(c); });

  const relLinks = RAW.edges.map(e => [e.a, e.b]);
  return { cats: RAW.cats, allNodes: RAW.allNodes, relLinks, Rcat, maxRloc };
}

const sphereGeo = new THREE.SphereGeometry(1, 14, 14);

/* ----------------------------------------------------------------------
 * 5. Build / dispose graph objects

let graphGroup = new THREE.Group();
scene.add(graphGroup);
let nodeMeshes = [], catMeshes = [], nodeLabels = [], catLabels = [], boundingRadius = 500, maxRlocG = 100, currentData = null;

function disposeGraph(){
  graphGroup.traverse(o => {
    if (o instanceof CSS2DObject && o.element) o.element.remove();
    if (o.geometry && o.geometry !== sphereGeo && o.geometry !== catGeo) o.geometry.dispose();
    if (o.material) { (Array.isArray(o.material)?o.material:[o.material]).forEach(m=>m.dispose()); }
  });
  scene.remove(graphGroup);
  graphGroup = new THREE.Group(); scene.add(graphGroup);
  nodeMeshes = []; catMeshes = []; nodeLabels = []; catLabels = []; hiLine = null;
  hiOld = []; hiBridge = null; hiPending = null; hiFadeIn = 0;   // highlight transition state dies with the old scene

/* ---- category label i18n (interface only — no settings UI by design) ----
 * Every place a category NAME is displayed goes through catLabel(); switch the language at
 * runtime with window.setCategoryLanguage('zh' | 'en') from the console or the host app.
 * Memory node names are user data and are never translated or re-cased. */
const CATEGORY_I18N = {
  en: {},   // default: data names pass through untouched
  zh: { person:'人物', organization:'组织', place:'地点', others:'其他', technology:'科技',
        business:'商业', food:'美食', lifestyle:'生活', sport:'运动', art:'艺术' },
};
let catLang = 'en';
function catLabel(catOrKey){
  const key = (typeof catOrKey === 'string' ? catOrKey : (catOrKey.key || catOrKey.name || '')).toLowerCase();
  const hit = (CATEGORY_I18N[catLang] || {})[key];
  if (hit) return hit;
  if (typeof catOrKey === 'string'){ const c = RAW && RAW.cats.find(c => c.key === catOrKey); return c ? c.name : catOrKey; }
  return catOrKey.name;
}
function setCategoryLanguage(lang){
  if (!CATEGORY_I18N[lang]) return false;
  catLang = lang;
  catLabels.forEach(it => {                       // live-rename the capsules; w/h reset → remeasured
    const nm = it.el.querySelector('.nm');
    if (nm) nm.textContent = catLabel(it.cat);
    it.w = null; it.h = null;
  });
  cullDirty = true;
  if (sheetOpen && selectedCat) document.getElementById('sSub').textContent = catLabel(selectedCat);
  return true;
}
window.setCategoryLanguage = setCategoryLanguage;

function makeCap(text, cls){
  const d = document.createElement('div');
  d.className = 'cap ' + cls;
  d.style.opacity = 0;                 // born invisible — the LOD fade loop owns opacity from here
  if (cls === 'cat') { d.innerHTML = ''; } // filled by caller
  else d.textContent = text;
  return d;
}

// Category pill icons (feather set, matching the Figma PillsMG board: users / briefcase /
// the generic signal glyph for every other category).
const FEATHER = {
  users:     '<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>',
  briefcase: '<rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>',
  rss:       '<path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1.4" fill="currentColor" stroke="none"/>',

function buildGraph(data){
  disposeGraph();
  scene.background = new THREE.Color(theme.bg);
  scene.fog = new THREE.FogExp2(theme.bg, theme.fog);
  applyStars();

  // --- hierarchy links (category -> node; loose nodes have none) ---
  const hier = [];
  data.cats.forEach(cat => { if (!cat.pos) return;   // Others is scattered → no centre, no hierarchy spokes
    cat.nodes.forEach(n => { hier.push(cat.pos.x,cat.pos.y,cat.pos.z, n.pos.x,n.pos.y,n.pos.z); }); });
  const hg = new THREE.BufferGeometry();
  hg.setAttribute('position', new THREE.Float32BufferAttribute(hier,3));
  const hierMat = new THREE.LineBasicMaterial({ color:theme.line, transparent:true, opacity:theme.hierOpacity });
  graphGroup.add(new THREE.LineSegments(hg, hierMat));

  // --- relationship links (cross-category + loose-group internal) ---
  const cross = [];
  data.relLinks.forEach(([a,b]) => cross.push(a.pos.x,a.pos.y,a.pos.z, b.pos.x,b.pos.y,b.pos.z));
  const cg = new THREE.BufferGeometry();
  cg.setAttribute('position', new THREE.Float32BufferAttribute(cross,3));
  const crossMat = new THREE.LineBasicMaterial({ color:theme.line, transparent:true, opacity:theme.lineOpacity });
  graphGroup.add(new THREE.LineSegments(cg, crossMat));
  baseLineMats = [hierMat, crossMat];

  // --- nodes (grouped + loose) — uniform white glowing dots per the Figma graph style ---
  const dotCol = new THREE.Color(theme.nodeDot);
  data.allNodes.forEach(n => {
    const mat = new THREE.MeshBasicMaterial({ color: dotCol });   // flat & unlit & OPAQUE (depth-dim darkens the colour, not opacity → no transparent-sort cost on mobile)
    const mesh = new THREE.Mesh(sphereGeo, mat);
    mesh.position.copy(n.pos); mesh.scale.setScalar(2.6);
    mesh.userData = { type:'node', data:n };
    graphGroup.add(mesh); nodeMeshes.push(mesh);
    if (theme.glow) addGlow(mesh, dotCol, 8);

    const cap = makeCap(n.name, 'node');
    const lbl = new CSS2DObject(cap);
    lbl.position.set(0, 0, 0); lbl.center.set(0.5, 0.5);   // capsule sits ON the point
    mesh.add(lbl);
    nodeLabels.push({ lbl, mesh, node:n, el:cap, w:null, h:null, op:0, on:false });
  });

  // --- categories (Others has no anchor/label — its nodes live scattered among their neighbours) ---
  data.cats.forEach(cat => {
    if (!cat.pos) return;
    const mat = new THREE.MeshBasicMaterial({ color: dotCol });   // flat & unlit & opaque
    const mesh = new THREE.Mesh(catGeo, mat);
    mesh.position.copy(cat.pos); mesh.scale.setScalar(5.5);
    mesh.userData = { type:'cat', data:cat };
    graphGroup.add(mesh); catMeshes.push(mesh);
    if (theme.glow) addGlow(mesh, dotCol, 22);

    // Figma PillsMG: [icon 14] NAME (uppercase via CSS) [count @40%]
    const cap = makeCap('', 'cat');
    const ic = document.createElement('span'); ic.className = 'ic'; ic.innerHTML = catIconSvg(cat);
    const nm = document.createElement('span'); nm.className = 'nm'; nm.textContent = catLabel(cat);
    const cnt = document.createElement('span'); cnt.className='cnt'; cnt.textContent = cat.nodes.length;
    cap.append(ic, nm, cnt);
    const lbl = new CSS2DObject(cap);
    lbl.position.set(0, 0, 0); lbl.center.set(0.5, 0.5);   // capsule sits ON the point
    mesh.add(lbl);
    catLabels.push({ lbl, mesh, cat, el:cap, w:null, h:null, op:0, on:false });
  });

  let maxR = data.Rcat;
  data.allNodes.forEach(n => { maxR = Math.max(maxR, n.pos.length()); });   // include loose clusters
  boundingRadius = maxR + UNIT;
  maxRlocG = Math.max(data.maxRloc, UNIT);
  currentData = data;
}

/* ----------------------------------------------------------------------
 * 6. Camera fit + zoom range ("one logic")
 * -------------------------------------------------------------------- */
function applyZoomRangeAndFit(margin, animate){
  const vFov = camera.fov * Math.PI/180;
  // account for portrait aspect (horizontal fov is the binding constraint)
  const hFov = 2 * Math.atan(Math.tan(vFov/2) * Math.min(1, camera.aspect));
  const fov = Math.min(vFov, hFov);
  const fitDist = (boundingRadius / Math.sin(fov/2)) * margin;

  // Zoom range is bounded by the non-overlap logic:
  //  - max zoom-OUT = the full-fit framing (can't pull back past "whole graph in view")
  //  - max zoom-IN  = the distance at which ONE cluster fills the view; by then the
  //                   nearest cluster's capsules are all shown, so we stop here.
  controls.maxDistance = fitDist;
  controls.minDistance = Math.min(clusterFitDistance(), fitDist * 0.6);
  window._fitDist = fitDist;

  if (animate){
    // Refit = pure dolly OUT. Move the camera RADIALLY out along the origin→camera ray to the fit
    // distance while the target pans to the graph centre. Because the camera stays on that ray, its
    // distance to the graph centre grows monotonically → the graph only ever shrinks (no zoom-in dip,
    // no two-segment swing), and the viewing angle is preserved.
    const r = camera.position.length();
    const outDir = r > 1 ? camera.position.clone().normalize() : new THREE.Vector3(0.35, 0.45, 1).normalize();
    startTween(outDir.multiplyScalar(fitDist), new THREE.Vector3(0,0,0));
  } else {
    controls.target.set(0,0,0);
    camera.position.copy(new THREE.Vector3(0.35, 0.45, 1).normalize().multiplyScalar(fitDist));
    controls.update();
  }
}
// distance at which one cluster fills the view (≈ the "Detail" tier)
function detailDistance(){ const v = camera.fov*Math.PI/180; return (maxRlocG / Math.sin(v/2)) * 1.25; }
// same idea but aspect-aware: the distance at which one cluster FITS the view on this screen
// (on portrait phones the narrow width is the binding constraint, not the height)
function clusterFitDistance(){
  const vFov = camera.fov * Math.PI/180;
  const hFov = 2 * Math.atan(Math.tan(vFov/2) * Math.min(1, camera.aspect));
  return (maxRlocG / Math.sin(Math.min(vFov, hFov)/2)) * 1.25;
}
// constant per dataset → every "zoom to this node" lands at the same distance from the target
function nodeFocusDist(){ return detailDistance() * 0.8; }

/* ----------------------------------------------------------------------
 * 7. Camera tween (focus / re-fit)
 * -------------------------------------------------------------------- */
let tween = null, _penMin = 0, _penMax = Infinity;
function startTween(destPos, destTarget){
  // Suspend OrbitControls' distance clamps for the duration of a programmatic move — otherwise
  // update() yanks the camera to min/maxDistance mid-tween (e.g. refit raises minDistance while the
  // camera is still closer than it → a jump). Restore the intended limits when the tween ends.
  _penMin = controls.minDistance; _penMax = controls.maxDistance;
  controls.minDistance = 0; controls.maxDistance = Infinity;
  tween = { p0: camera.position.clone(), t0: controls.target.clone(), p1: destPos.clone(), t1: destTarget.clone(), k: 0 };
}
function stepTween(){
  if (!tween) return;
  tween.k = Math.min(1, tween.k + 0.018);                          // slower fly (~0.9s)
  const k = tween.k;
  const e = k < 0.5 ? 4*k*k*k : 1 - Math.pow(-2*k + 2, 3) / 2;     // ease-in-out cubic (gentle start & stop)
  camera.position.lerpVectors(tween.p0, tween.p1, e);
  controls.target.lerpVectors(tween.t0, tween.t1, e);
  if (tween.k >= 1){ tween = null; controls.minDistance = _penMin; controls.maxDistance = _penMax; }
}
function focusCategory(cat){
  // Consistent framing: every category is viewed from the SAME distance, so its ball reads
  // at a consistent size (Business no longer looks huge next to Technology). Big clusters may
  // spill off-screen — pan (enabled once zoomed in) to see the rest.
  const dist = detailDistance() * 0.68;                  // closer than "cluster fills view" → the category reads bigger on zoom-in
  controls.minDistance = Math.min(controls.minDistance, dist * 0.9);
  const dir = cat.pos.length() > 1 ? cat.pos.clone().normalize() : new THREE.Vector3(0.3, 0.4, 1).normalize();
  dir.y += 0.18; dir.normalize();                        // slight top-down baked into the unit dir → |dest−cat| stays = dist

  // Cap the view swing. The canonical viewpoint above sits radially OUTSIDE the category, facing
  // the graph centre — flying there from the opposite side means the view wraps ~180° in the last
  // stretch of the tween. So: rotate the CURRENT approach direction at most MAX_SWING toward the
  // canonical one and park there instead (same `dist`, so the category still reads the same size).
  // Near-side taps are unaffected (their angle is already under the cap); far-side taps approach
  // from where the camera already is, even if that viewpoint doesn't face the graph centre.
  const MAX_SWING = Math.PI / 3;                         // ≤60° of orbit per category tap
  const fromDir = camera.position.clone().sub(cat.pos);
  if (fromDir.lengthSq() > 1){
    fromDir.normalize();
    const ang = fromDir.angleTo(dir);
    if (ang > MAX_SWING){
      const axis = new THREE.Vector3().crossVectors(fromDir, dir);
      if (axis.lengthSq() > 1e-6) axis.normalize();                       // great-circle toward canonical
      else { axis.set(0, 1, 0); if (Math.abs(fromDir.y) > 0.95) axis.set(1, 0, 0); }  // antipodal → yaw around
      dir.copy(fromDir).applyQuaternion(new THREE.Quaternion().setFromAxisAngle(axis, MAX_SWING));
    }
  }
  const dest = cat.pos.clone().addScaledVector(dir, dist);
  startTween(dest, cat.pos.clone());

  setSelected(null, cat);   // force the focused category's capsule visible & non-occluded
  autoRotate = false;   // stop spin while reading
}

// Step back up to the whole-graph overview (also the Re-fit action).
function unfocusToOverview(){
  closeSheet();
  setSelected(null, null);                       // leaving for the overview drops the selection
  applyZoomRangeAndFit(curFit, true);            // tween out + restore normal zoom range
  autoRotate = true;
}

// Bring a point to the screen. frac=0 → centre (default); frac=1/3 → upper third
// (leaves the lower half free for the bottom sheet). dist optional (keeps current zoom).
function locate(pos, dist, frac){
  const off = camera.position.clone().sub(controls.target);
  const d = dist != null ? dist : off.length();
  off.normalize();
  controls.minDistance = Math.min(controls.minDistance, d * 0.9);
  const tgt = pos.clone();
  if (frac){   // shift the orbit target down in screen space so the node rides higher
    const up = camera.up.clone().addScaledVector(off, -camera.up.dot(off)).normalize();
    tgt.addScaledVector(up, -d * Math.tan(camera.fov*Math.PI/360) * frac);
  }
  startTween(tgt.clone().addScaledVector(off, d), tgt);
  autoRotate = false;
}

// Is the node already comfortably visible (on-screen, in the upper ~half the sheet won't cover)?
function nodeInComfortZone(p){
  tmp.copy(p).project(camera);
  if (tmp.z > 1) return false;
  const x = (tmp.x*0.5+0.5)*innerWidth, y = (-tmp.y*0.5+0.5)*innerHeight;
  return x > innerWidth*0.06 && x < innerWidth*0.94 && y > innerHeight*0.10 && y < innerHeight*0.52;
}

/* ----------------------------------------------------------------------
 * 8. Render loop + label LOD
 * -------------------------------------------------------------------- */
let cullEnabled = true, selectedNode = null, selectedCat = null, hiLine = null;
const tmp = new THREE.Vector3();
const lineRes = new THREE.Vector2(innerWidth, innerHeight);

// Selected node's edges → a brighter, thicker overlay drawn to each neighbour.
// The highlight is SYNCED TO THE CAMERA: on a selection change the old node's lit edges fade OUT
// while the camera flies (only the old↔new edge — the "bridge" — stays lit through the move), and
// the new node's edges fade IN only once the camera has settled. Same from the unlit state: the
// first tap lights nothing until the zoom-in lands, then the connections fade in.
let hiFadeIn = 0;        // 0..1 lit level of hiLine (1 = fully lit)
let hiPending = null;    // node whose edges light up at the next camera-settle
let hiOld = [];          // previous highlights fading out: [{line, k}]
let hiBridge = null;     // the old↔new edge kept lit through the transition
function makeHiLine(pts, opacity){
  const g = new LineSegmentsGeometry(); g.setPositions(pts);
  const m = new LineMaterial({ color: theme.lineHi, transparent: true, opacity, linewidth: 1.5 });
  m.resolution.copy(lineRes);
  const l = new LineSegments2(g, m); l.renderOrder = 2; graphGroup.add(l);
  return l;
}
function dropHiLine(l){ if (l){ graphGroup.remove(l); l.geometry.dispose(); l.material.dispose(); } }
function edgePts(n, excl){          // all of n's edges; excl = skip the edge shared with that node
  const pts = [];
  RAW.edges.forEach(({a,b}) => {
    if ((a === n || b === n) && !(excl && (a === excl || b === excl)))
      pts.push(a.pos.x,a.pos.y,a.pos.z, b.pos.x,b.pos.y,b.pos.z);
  });
  return pts;
}
function transitionEdgeHighlight(prev, next){
  if (prev === next && hiLine) return;             // re-tap of the same node: leave it lit
  if (hiBridge){ hiOld.push({ line: hiBridge, k: 1 }); hiBridge = null; }   // leftover of a rapid re-tap
  if (hiLine){
    const k0 = hiFadeIn;
    dropHiLine(hiLine); hiLine = null;
    if (prev && k0 > 0.01){
      const pts = edgePts(prev, next);             // everything except the bridge edge
      if (pts.length) hiOld.push({ line: makeHiLine(pts, k0 * theme.lineHiOpacity), k: k0 });
      if (next){
        const bp = [];
        RAW.edges.forEach(({a,b}) => { if ((a===prev && b===next) || (a===next && b===prev))
          bp.push(a.pos.x,a.pos.y,a.pos.z, b.pos.x,b.pos.y,b.pos.z); });
        if (bp.length) hiBridge = makeHiLine(bp, k0 * theme.lineHiOpacity);
      }
    }
  }
  hiPending = next || null; hiFadeIn = 0;
}
// Per frame: advance both fades; the moment the camera is at rest, light the pending node's edges.
function stepEdgeFade(){
  if (hiPending && !tween){
    const n = hiPending; hiPending = null;
    if (n === selectedNode){
      const pts = edgePts(n, null);
      if (pts.length){ hiLine = makeHiLine(pts, 0); hiFadeIn = 1e-4; }
    }
  }
  for (let i = hiOld.length - 1; i >= 0; i--){
    const o = hiOld[i]; o.k -= 0.045;              // ≈0.37s fade-out, finishes during the flight
    if (o.k <= 0){ dropHiLine(o.line); hiOld.splice(i, 1); }
    else o.line.material.opacity = o.k * theme.lineHiOpacity;
  }
  if (hiLine && hiFadeIn < 1){
    hiFadeIn = Math.min(1, hiFadeIn + 0.04);       // ≈0.42s fade-in, starts on arrival
    hiLine.material.opacity = hiFadeIn * theme.lineHiOpacity;
    if (hiFadeIn >= 1 && hiBridge){ dropHiLine(hiBridge); hiBridge = null; }   // bridge folds into the full set
  }
}
// One entry point for selection: capsule ring + forced/non-occluded label + lit edges.
function setSelected(node, cat){
  const prevNode = selectedNode;
  selectedNode = node || null; selectedCat = cat || null; cullDirty = true;
  nodeLabels.forEach(it => it.el.classList.toggle('selected', it.node === selectedNode));
  catLabels.forEach(it => it.el.classList.toggle('selected', it.cat === selectedCat));
  transitionEdgeHighlight(prevNode, selectedNode);
}

// Depth dim — nodes behind the focal plane fade toward the background; near/focal stay full.
// (Chosen over "focus mode": keeps the whole graph legible & reads as real 3D depth; the
//  selected node's highlighted edges + non-occluded label carry the focus instead.)
// Focal plane (= orbit target distance) is brightest; both sides dim — far more than near.
// Dot stays OPAQUE (cheap on mobile): dim by lerping its colour toward the background, not opacity.
// The fill-rate-heavy glow sprite is hidden once a node dims past a threshold → far less overdraw.
const DIM_FAR = 0.2, DIM_NEAR = 0.6;
const _bg = new THREE.Color();
function updateDepth(){
  const cam = camera.position, focal = cam.distanceTo(controls.target), span = Math.max(1, boundingRadius*0.95);
  _bg.set(theme.bg);
  for (const it of nodeLabels){
    if (it._glow === undefined) it._glow = it.mesh.children.find(c => c.isSprite) || null;
    if (it._base === undefined) it._base = new THREE.Color(theme.nodeDot);
    let op;
    if (it.node === selectedNode) op = 1;
    else { const dd = (it.node.pos.distanceTo(cam) - focal) / span;   // signed distance from focal plane
      op = dd >= 0 ? 1 - (1-DIM_FAR)*Math.min(1, dd) : 1 - (1-DIM_NEAR)*Math.min(1, -dd); }
    if (intro) op *= (intro.fade || 0);                      // boot: everything fades up from black
    it.mesh.material.color.copy(it._base).lerp(_bg, 1 - op);
    if (it._glow){ it._glow.visible = op > 0.32; it._glow.material.opacity = theme.glowOpacity * op; }
  }
}

/* ----------------------------------------------------------------------
 * 7b. Boot intro — 三段式：scattered dots CONVERGE into a small ball (~1/2.8 of
 *     the final graph), hold a beat, then EXPLODE into the real layout while the
 *     camera pulls back (「汇聚」+「拉远」合并). Edges & capsules fade in at the
 *     end of the burst. Tap anywhere to skip.
 * -------------------------------------------------------------------- */
let baseLineMats = [];
let intro = null, introJustSkipped = false;
const labelsEl = document.getElementById('labels');
const INTRO_T = { total: 148, tail: 20 };   // one continuous gesture ≈ 2.5s + settle
const introCamDir = new THREE.Vector3(0.35, 0.45, 1).normalize();
function runIntro(){
  if (!nodeMeshes.length || matchMedia('(prefers-reduced-motion: reduce)').matches){
    document.body.classList.add('ready');        // no intro → chrome shows immediately
    return;
  }
  if (isFinite(camera.position.x) && camera.position.lengthSq() > 1) introCamDir.copy(camera.position).normalize();
  const R = boundingRadius, items = [];
  [...nodeMeshes, ...catMeshes].forEach((m, i, arr) => {
    const id = String((m.userData.data && (m.userData.data.id || m.userData.data.key)) || i);
    const j1 = hash01(id + 'a'), j2 = hash01(id + 'b'), j3 = hash01(id + 'c');
    const dir = new THREE.Vector3(j1 - .5, j2 - .5, j3 - .5);
    if (dir.lengthSq() < 1e-4) dir.set(0, 1, 0);
    dir.normalize();
    const it = {
      m, fin: m.userData.data.pos.clone(), j: hash01(id + 't'),               // fin from the authoritative layout (re-runnable any time)
      scatter: dir.multiplyScalar(R * (0.55 + 0.6 * j2)),                      // loose cloud, inside the boot framing
      ball: fibDir(i, arr.length).multiplyScalar(R * 0.30 * (0.8 + 0.2 * j3)), // the condensed globe (~1/3 scale)
    };
    m.position.copy(it.scatter);
    items.push(it);
  });
  baseLineMats.forEach(mt => mt.opacity = 0);
  labelsEl.style.opacity = 0;
  controls.enabled = false; autoRotate = false;
  controls.target.set(0, 0, 0);
  camera.position.copy(introCamDir).multiplyScalar((window._fitDist || R * 3) * 0.88);
  intro = { items, t: 0 };
}
function stepIntro(){
  if (!intro) return;
  const t = ++intro.t, fit = window._fitDist || boundingRadius * 3;
  intro.fade = _eIO(Math.min(1, t / 34));                    // opening fade-in of the whole field
  const k = Math.min(1, t / INTRO_T.total);
  // ONE gesture, slow-fast-slow: converge ACCELERATES into the ball, the ball is the energy peak
  // (a fast half-turn, no scaling), the burst is FLUNG out of the spin and decelerates into place.
  // Implementation: a global rotation Θ(k) = Θtotal·(1−S(k)) is applied to every position; S is a
  // strongly mid-peaked progress curve, so the angular speed follows the same slow-fast-slow arc,
  // Θ hits exactly 0 at the end (final layout lands exact), and the explosion inherits the spin.
  const S = k < .5 ? 16*k*k*k*k*k : 1 - 16*Math.pow(1 - k, 5);
  const TH = 1.4 * Math.PI * (1 - S);                        // 252° total → ~133° inside the ball window
  const CONV = 0.44, BALL = 0.58;                            // master-clock bands
  intro.items.forEach(it => {
    if (k <= CONV){                                          // ① 慢入 → 加速冲向球
      const e = _eIn(_stag(k / CONV, it.j));
      _pos.lerpVectors(it.scatter, it.ball, e);
    } else if (k <= BALL){                                   // ② 球体 = 速度峰值（纯旋转，无缩放）
      _pos.copy(it.ball);
    } else {                                                 // ③ 甩出（先释放后长减速）→ 慢出到位
      const e = _eFling(_stag((k - BALL) / (1 - BALL), it.j));
      _pos.lerpVectors(it.ball, it.fin, e);
    }
    it.m.position.copy(_pos.applyAxisAngle(_swirlAxis, TH));
  });
  // camera: one continuous curve — slight push-in through the wind-up, pull-back with the burst
  const camK = k <= BALL ? 0.88 - 0.03 * _eIO(k / BALL)
                         : 0.85 + 0.15 * _eIO((k - BALL) / (1 - BALL));
  camera.position.copy(introCamDir).multiplyScalar(fit * camK);
  const lf = Math.max(0, Math.min(1, (k - 0.78) / 0.18));    // edges fade in while the burst settles
  baseLineMats.forEach((mt, i) => mt.opacity = (i === 0 ? theme.hierOpacity : theme.lineOpacity) * lf);
  if (t > INTRO_T.total) labelsEl.style.opacity = 1;         // settle: capsules fade in
  if (t > INTRO_T.total + INTRO_T.tail) finishIntro();
}
const _swirlAxis = new THREE.Vector3(0.25, 1, 0.12).normalize();
const _pos = new THREE.Vector3();
const _stag = (k, j) => Math.min(1, Math.max(0, (k - 0.25 * j) / 0.75));   // ±25% per-node clock offset
const _eIn  = x => x * x * x;
const _eOut = x => 1 - Math.pow(1 - x, 3);
// fling: a ~15% smooth "release" ramp out of the spin, then the long cubic deceleration
const _eFling = x => { const a = Math.min(1, x / 0.15), g = a * a * (3 - 2 * a); return g * (1 - Math.pow(1 - x, 4)); };   // quartic tail — the landing eases out longer
const _eIO  = x => x < .5 ? 4*x*x*x : 1 - Math.pow(-2*x + 2, 3) / 2;
function finishIntro(){
  if (!intro) return;
  intro.items.forEach(it => it.m.position.copy(it.fin));
  baseLineMats.forEach((mt, i) => mt.opacity = i === 0 ? theme.hierOpacity : theme.lineOpacity);
  camera.position.copy(introCamDir).multiplyScalar(window._fitDist || boundingRadius * 3);
  controls.target.set(0, 0, 0);
  controls.enabled = true; autoRotate = true;
  intro = null;
  cullDirty = true; lastDecideT = -1e9;          // fresh LOD pass first…
  labelsEl.style.opacity = 1;                    // …then reveal (elements fade in individually)
  document.body.classList.add('ready');          // search icon may appear now
}
renderer.domElement.addEventListener('pointerdown', () => { if (intro){ finishIntro(); introJustSkipped = true; } });

function loop(){
  requestAnimationFrame(loop);
  try {
    stepTween();
    stepIntro();
    stepEdgeFade();
    controls.autoRotate = autoRotate && !pointerDown && !sheetOpen && !tween;
    controls.update();

    if (!intro) maybeCull();
    updateDepth();

    renderer.render(scene, camera);
    labelRenderer.render(scene, camera);
  } catch (e) {
    window._lastErr = String((e && e.stack) || e);   // keep the loop alive; surface the error for debugging
  }
}

/* ----------------------------------------------------------------------
 * 8b. Capsule visibility — depth + non-overlap, smoothed
 *
 *  Three things keep it from flickering:
 *   1. DEPTH CULL  — only the FRONT hemisphere shows; clusters that rotate
 *      to the back fade out. Gives a real 3D "near layer / far layer" read
 *      and roughly halves the labels in play.
 *   2. THROTTLE + HYSTERESIS — the keep/drop decision runs ~9x/sec (not every
 *      frame), and a shown capsule is "sticky" (harder to drop than to add),
 *      so labels don't trade places as the camera nudges.
 *   3. FADE — opacity eases toward the decision every frame, so changes
 *      cross-fade instead of blinking.
 * -------------------------------------------------------------------- */
const PAD = 5, HYST = 10;          // gap between capsules / stickiness margin (px)
const DECIDE_MS = 110;             // how often the keep/drop set is recomputed
const FADE = 0.08;                 // opacity easing per frame (gentle cross-fade between tiers)
const scr = { x:0, y:0 };
const wp = new THREE.Vector3();
let cullDirty = true, visibleCaps = 0, lastDecideT = -1e9, curTier = 0;
const lastCamPos = new THREE.Vector3(1e9,1e9,1e9);

const grid = (function(cell){
  const map = new Map();
  const cells = (r,fn) => {
    const x0=Math.floor(r.x/cell), x1=Math.floor((r.x+r.w)/cell);
    const y0=Math.floor(r.y/cell), y1=Math.floor((r.y+r.h)/cell);
    for (let cx=x0;cx<=x1;cx++) for (let cy=y0;cy<=y1;cy++) fn(cx*73856+cy);
  };
  return {
    clear(){ map.clear(); },
    insert(r){ cells(r, k => { let a=map.get(k); if(!a){a=[];map.set(k,a);} a.push(r); }); },
    hits(r){ let bad=false; cells(r, k => { const a=map.get(k); if(a&&!bad) for(const o of a){ if(r.x<o.x+o.w&&r.x+r.w>o.x&&r.y<o.y+o.h&&r.y+r.h>o.y){bad=true;break;} } }); return bad; }
  };
})(80);

function measure(it){
  if (it.w != null) return true;
  const w = it.el.offsetWidth, h = it.el.offsetHeight;
  if (w > 0) { it.w = w; it.h = h; return true; }
  return false;
}
function project(){                                   // projects `wp`, fills scr
  tmp.copy(wp).project(camera);
  if (tmp.z > 1) return false;                        // behind camera / far plane
  scr.x = (tmp.x*0.5+0.5)*innerWidth;
  scr.y = (-tmp.y*0.5+0.5)*innerHeight;
  return scr.x>-80 && scr.x<innerWidth+80 && scr.y>-60 && scr.y<innerHeight+60;
}

// Decide which capsules should be on (throttled).
function decide(){
  grid.clear();
  const vFov = camera.fov * Math.PI/180;
  const centerDist = camera.position.distanceTo(controls.target);

  // Zoom tier as a continuous factor:
  //   t = 0  → Overview  (only categories; node text hidden, dots remain)
  //   t = 1  → zoomed into a cluster (all of its nodes legible)
  // The middle (manual zoom) blends: the node depth-band widens with t, so
  // nodes fade in gradually & mixed with categories — non-overlap still holds.
  const overviewDist = window._fitDist || (boundingRadius*3);
  const detailDist   = (maxRlocG / Math.sin(vFov/2)) * 1.25;
  let t = (overviewDist - centerDist) / Math.max(1, overviewDist - detailDist);
  t = t < 0 ? 0 : t > 1 ? 1 : t;
  curTier = t;

  const nodeCut = centerDist + t * Math.max(boundingRadius*0.03, maxRlocG*1.3);
  const catCut  = centerDist + boundingRadius*0.35;
  const nodesAllowed = t > 0.05;                      // hard categories-only at the very top

  const nodes = nodeLabels.slice();
  for (const it of nodes){ it.mesh.getWorldPosition(wp); it._d2 = wp.distanceToSquared(camera.position); }
  nodes.sort((a,b)=>a._d2-b._d2);
  const isForced = it => (it.node && it.node === selectedNode) || (it.cat && it.cat === selectedCat);
  const order = [...catLabels, ...nodes];             // categories claim space first…
  order.sort((a,b) => (isForced(b)?1:0) - (isForced(a)?1:0));   // …but the SELECTED capsule claims before all → its overlappers hide

  let shown = 0, pending = false;
  for (const it of order){
    const isCat = it.cat != null;
    const forced = isForced(it);
    if (!isCat && !forced && !nodesAllowed) { it.on = false; continue; }           // Overview = no node text
    it.mesh.getWorldPosition(wp);
    const d = wp.distanceTo(camera.position);
    if (!forced && d > (isCat ? catCut : nodeCut)) { it.on = false; continue; }     // back / out-of-tier
    if (!measure(it)) { it.on = true; shown++; pending = true; continue; }          // re-decide once laid out
    if (!project()) { it.on = false; continue; }
    const pad = it.on ? PAD : PAD + HYST;             // sticky: shown ones are easier to keep
    const r = { x: scr.x-it.w/2-pad, y: scr.y-it.h/2-pad, w: it.w+2*pad, h: it.h+2*pad };
    if (forced || !grid.hits(r)) {
      it.on = true; shown++;
      grid.insert({ x: scr.x-it.w/2-PAD, y: scr.y-it.h/2-PAD, w: it.w+2*PAD, h: it.h+2*PAD });
    } else it.on = false;
  }
  visibleCaps = shown;
  if (pending) cullDirty = true;
}

// Ease every capsule's opacity toward its on/off target (every frame).
function fadeLabel(it){
  const target = it.on ? 1 : 0;
  it.op += (target - it.op) * FADE;
  if (it.on || it.op > 0.02){
    if (!it.lbl.visible) it.lbl.visible = true;
    it.el.style.opacity = it.op.toFixed(3);
  } else if (it.lbl.visible){
    it.lbl.visible = false;
  }
}

function maybeCull(){
  if (!cullEnabled){
    for (const it of nodeLabels) it.on = true;
    for (const it of catLabels) it.on = true;
    visibleCaps = nodeLabels.length + catLabels.length;
  } else {
    const moved = camera.position.distanceToSquared(lastCamPos);
    const now = performance.now();
    if (cullDirty || (moved > 0.0001 && now - lastDecideT > DECIDE_MS)){
      lastDecideT = now; lastCamPos.copy(camera.position); cullDirty = false;
      decide();
    }
  }
  for (const it of nodeLabels) fadeLabel(it);
  for (const it of catLabels) fadeLabel(it);
}

/* ----------------------------------------------------------------------
 * 9. Interaction: tap to select / focus
 * -------------------------------------------------------------------- */
const ray = new THREE.Raycaster();
const ndc = new THREE.Vector2();
let pointerDown = false, downX=0, downY=0, downT=0, moved=0;

renderer.domElement.addEventListener('pointerdown', e => { pointerDown=true; downX=e.clientX; downY=e.clientY; downT=performance.now(); moved=0; });
renderer.domElement.addEventListener('pointermove', e => { if(pointerDown) moved=Math.max(moved, Math.hypot(e.clientX-downX, e.clientY-downY)); });

/* Two-finger gesture — maps-style continuous zoom+pan (no mode guessing).
 * OrbitControls' stock two-finger mode is DOLLY_PAN with the zoom anchored at the SCREEN CENTRE:
 * pinching around anything off-centre makes the content slide out from under the fingers, and
 * classifying intent (zoom XOR pan) guesses wrong on sloppy real-world gestures. Instead we track
 * the two touch points ourselves and, on every move, keep the graph glued to the fingers:
 *   spread ratio   → dolly anchored at the pinch centroid (what you pinch is what grows)
 *   centroid drift → pan, at ANY zoom level (a tap on empty space recentres if it drifts)
 * Both channels run simultaneously and continuously — nothing to misjudge, nothing locks out.
 * One guard: the zoom channel arms only after ~10px of deliberate spread change, so a flat
 * two-finger drag can't slowly zoom-drift. Pan is live from the first pixel. One finger = rotate.
 */
controls.touches.TWO = -1;            // unknown mode → OrbitControls ignores two-finger (rotate/wheel unaffected)
const g2P = new Map();                // active touch points: pointerId → {x, y}
let g2 = null;                        // running baseline {d, cx, cy, d0, zoomOn} of the current 2-finger gesture
let simVP = null;                     // TEMP test hook: {w, h} fake viewport for the 0×0 headless pane
const g2Right = new THREE.Vector3(), g2Up = new THREE.Vector3(), g2Shift = new THREE.Vector3();
function g2Apply(){
  if (intro) return;                    // boot intro owns the camera
  const [a, b] = [...g2P.values()];
  const m = { d: Math.hypot(a.x - b.x, a.y - b.y), cx: (a.x + b.x)/2, cy: (a.y + b.y)/2 };
  if (!g2){ g2 = { ...m, d0: m.d, zoomOn: false }; return; }
  const W = simVP ? simVP.w : (renderer.domElement.clientWidth  || innerWidth);
  const H = simVP ? simVP.h : (renderer.domElement.clientHeight || innerHeight);
  if (!(H > 0) || m.d < 12){ Object.assign(g2, m); return; }
  // Arm the zoom channel only on a DELIBERATE spread change: >12% of the starting spread
  // (spread wobble while dragging scales with how far apart the fingers are), floor 16px.
  if (!g2.zoomOn && Math.abs(m.d - g2.d0) > Math.max(16, g2.d0 * 0.12)){ g2.zoomOn = true; g2.d = m.d; }
  const dist = camera.position.distanceTo(controls.target);
  const wpp = 2 * dist * Math.tan(camera.fov * Math.PI/360) / H;   // world units per screen px at target depth
  // 1) dolly, anchored at the pinch centroid
  let f = 1;
  if (g2.zoomOn){
    f = THREE.MathUtils.clamp(g2.d / m.d, 0.75, 1.33);             // per-event ratio; bounds kill jitter spikes
    f = THREE.MathUtils.clamp(dist * f, controls.minDistance, controls.maxDistance) / dist;
    camera.position.sub(controls.target).multiplyScalar(f).add(controls.target);
  }
  // 2) lateral shift = follow the centroid drift + keep the point under the centroid pinned while dollying
  g2Right.setFromMatrixColumn(camera.matrix, 0);
  g2Up.setFromMatrixColumn(camera.matrix, 1);
  const px = -(m.cx - g2.cx) + (1 - f) * (m.cx - W/2);   // net view shift, screen x
  const py =  (m.cy - g2.cy) - (1 - f) * (m.cy - H/2);   // screen y is down, world up is up
  g2Shift.copy(g2Right).multiplyScalar(px * wpp).addScaledVector(g2Up, py * wpp);
  controls.target.add(g2Shift);
  camera.position.add(g2Shift);
  Object.assign(g2, m);
}
renderer.domElement.addEventListener('pointerdown', e => {
  if (e.pointerType !== 'touch') return;
  if (e.isPrimary) g2P.clear();                          // new touch sequence → drop any stale pointers
  g2P.set(e.pointerId, {x: e.clientX, y: e.clientY});
  g2 = null;                                             // finger count changed → re-baseline
});
renderer.domElement.addEventListener('pointermove', e => {
  if (!g2P.has(e.pointerId)) return;
  g2P.set(e.pointerId, {x: e.clientX, y: e.clientY});
  if (g2P.size === 2) g2Apply();
});
const g2End = e => { g2P.delete(e.pointerId); g2 = null; };
renderer.domElement.addEventListener('pointerup', g2End);
renderer.domElement.addEventListener('pointercancel', g2End);
function hitCapsule(px, py){
  let best = null, bestD = Infinity;
  const scan = (arr, type) => {
    for (const it of arr){
      if (!it.lbl.visible || it.op < 0.45) continue;     // only clearly-shown capsules
      const rc = it.el.getBoundingClientRect();
      if (px>=rc.left && px<=rc.right && py>=rc.top && py<=rc.bottom){
        const d = (px-(rc.left+rc.width/2))**2 + (py-(rc.top+rc.height/2))**2;
        if (d < bestD){ bestD = d; best = { it, type }; }
      }
    }
  };
  scan(catLabels, 'cat'); scan(nodeLabels, 'node');   // nodes win ties (drawn on top)
  return best;
}
// Screen-space pick of a node DOT (works even when its label is culled). Frontmost within ~22px wins.
function hitNode(px, py){
  let best = null, bestZ = Infinity, R2 = 22*22;
  for (const it of nodeLabels){
    tmp.copy(it.node.pos).project(camera);
    if (tmp.z > 1) continue;
    const sx = (tmp.x*0.5+0.5)*innerWidth, sy = (-tmp.y*0.5+0.5)*innerHeight;
    if ((px-sx)**2 + (py-sy)**2 > R2) continue;
    const z = it.node.pos.distanceToSquared(camera.position);
    if (z < bestZ) { bestZ = z; best = it.node; }
  }
  return best;
}
// Tapping a category behaves exactly like tapping a memory: the cluster parks at the
// upper third (consistent distance) and its sheet opens — see openCategorySheet.
renderer.domElement.addEventListener('pointerup', e => {
  pointerDown = false;
  if (intro) return;                                       // intro owns the stage
  if (introJustSkipped){ introJustSkipped = false; return; }   // the skip tap itself does nothing else
  if (moved > 9 || performance.now()-downT > 500) return; // was a drag, not a tap

  // 1) a visible capsule wins
  const cap = hitCapsule(e.clientX, e.clientY);
  if (cap){
    if (cap.type === 'cat') openCategorySheet(cap.it.cat); else openSheet(cap.it.node);
    return;
  }
  // 2) once zoomed in, tapping a node DOT (even with no visible label) opens it
  if (curTier > 0.2){
    const nd = hitNode(e.clientX, e.clientY);
    if (nd){ openSheet(nd); return; }
  }
  // 3) a bare category dot → same tier-aware behaviour
  ndc.x = (e.clientX/innerWidth)*2-1; ndc.y = -(e.clientY/innerHeight)*2+1;
  ray.setFromCamera(ndc, camera);
  const catHit = ray.intersectObjects(catMeshes, false);
  if (catHit.length){ openCategorySheet(catHit[0].object.userData.data); return; }
  // 4) empty space → zoom back out (unfocusToOverview also closes any open sheet). One tap, reliable.
  //    Also fires when the view has PANNED off the graph centre — zooming out from a corner leaves
  //    the graph off-centre at full zoom-out, and recentring must still be one tap away.
  const overviewDist = window._fitDist || (boundingRadius*3);
  const offCentre = controls.target.length() > boundingRadius * 0.02;
  if (camera.position.distanceTo(controls.target) < overviewDist*0.92 || offCentre) { unfocusToOverview(); return; }
  if (sheetOpen) closeSheet();   // already at overview → just dismiss a lingering sheet
});

/* ----------------------------------------------------------------------
 * 10. Detail sheet
 * -------------------------------------------------------------------- */
const sheet = document.getElementById('sheet');
let sheetOpen = false;

/* Sheet detents + drag. Opens at HALF (42vh). At half, a body drag moves the SHEET (up → full,
 * down → dismiss) — content never scrolls at half. At FULL the body scrolls natively; once it is
 * back at scrollTop 0, a further down-drag hands the gesture back to the sheet and collapses it
 * (mid-gesture handoff included). The header strip is always a direct drag hotzone and a tap on
 * it toggles half ↔ full. On release we snap to the detent nearest to position + ~160ms of fling. */
const sheetBodyEl = document.getElementById('sheetBody');
const sheetHeadEl = document.getElementById('sheetHead');
const vpH = () => (simVP && simVP.h) || innerHeight;
const sheetFullH = () => sheet.getBoundingClientRect().height || vpH() * 0.9;   // rect is 0 in the headless test pane
const sheetHalfOff = () => Math.max(0, sheetFullH() - vpH() * 0.42);            // translateY of the half detent
const sheetTy = () => { try { return new DOMMatrixReadOnly(getComputedStyle(sheet).transform).m42; } catch { return 0; } };
let sd = null;   // active drag: {y0, ty0, mode: null|'sheet'|'scroll', lastY, lastT, v, fromHead, moved}
sheet.addEventListener('touchstart', e => {
  if (!sheetOpen || e.touches.length !== 1){ sd = null; return; }
  const t = e.touches[0];
  sd = { y0: t.clientY, ty0: 0, mode: null, lastY: t.clientY, lastT: performance.now(), v: 0,
         fromHead: !!(e.target.closest && e.target.closest('#sheetHead')), moved: 0 };
}, {passive: true});
sheet.addEventListener('touchmove', e => {
  if (!sd || e.touches.length !== 1) return;
  const y = e.touches[0].clientY, dy = y - sd.y0;
  sd.moved = Math.max(sd.moved, Math.abs(dy));
  const now = performance.now();
  if (now > sd.lastT) sd.v = 0.6*sd.v + 0.4*((y - sd.lastY) / (now - sd.lastT));   // px/ms, smoothed
  const goingDown = y > sd.lastY;
  sd.lastY = y; sd.lastT = now;
  if (!sd.mode){
    const full = sheet.classList.contains('full');
    if (sd.fromHead || !full || (sheetBodyEl.scrollTop <= 0 && dy > 0)) sd.mode = 'sheet';
    else sd.mode = 'scroll';
    if (sd.mode === 'sheet'){ sd.ty0 = sheetTy(); sd.y0 = y; sheet.style.transition = 'none'; }
  } else if (sd.mode === 'scroll' && goingDown && sheetBodyEl.scrollTop <= 0){
    sd.mode = 'sheet'; sd.ty0 = sheetTy(); sd.y0 = y; sheet.style.transition = 'none';   // scroll → sheet handoff
  }
  if (sd.mode === 'sheet'){
    if (!sd.fromHead) e.preventDefault();               // we own the gesture — block native scroll
    sheet.style.transform = `translateY(${Math.max(0, sd.ty0 + (y - sd.y0))}px)`;
  }
}, {passive: false});
sheet.addEventListener('touchend', e => {
  if (!sd) return;
  const { mode, v, moved, fromHead } = sd; sd = null;
  const curTy = sheetTy();                               // read BEFORE clearing the inline transform
  sheet.style.transition = '';
  if (moved < 8 && fromHead && !(e.target.closest && e.target.closest('.close'))){
    e.preventDefault();                                  // suppress the synthetic click (mouse path has its own)
    sheet.style.transform = ''; sheet.classList.toggle('full'); return;
  }
  if (mode !== 'sheet'){ return; }
  const proj = curTy + v * 160;                          // position + a little fling
  const cands = [ {off: 0, act: 'full'}, {off: sheetHalfOff(), act: 'half'}, {off: sheetFullH() * 1.05, act: 'close'} ];
  let best = cands[0]; for (const c of cands) if (Math.abs(proj - c.off) < Math.abs(proj - best.off)) best = c;
  sheet.style.transform = '';                            // hand back to the class-driven transform (it animates)
  if (best.act === 'close') closeSheet();
  else sheet.classList.toggle('full', best.act === 'full');
});
sheet.addEventListener('touchcancel', () => { if (sd){ sd = null; sheet.style.transition = ''; sheet.style.transform = ''; } });
sheet.addEventListener('transitionend', e => {
  // After the sheet slides to a new detent, force the scroller to rebuild — iOS otherwise keeps the
  // OLD touch region for a scroller inside a transformed fixed ancestor, leaving the part of the
  // body that used to be below the fold unresponsive after expanding to full.
  if (e.target !== sheet || e.propertyName !== 'transform' || !sheetOpen) return;
  const st = sheetBodyEl.scrollTop;
  sheetBodyEl.style.overflowY = 'hidden';
  void sheetBodyEl.offsetHeight;                 // reflow
  sheetBodyEl.style.overflowY = '';
  sheetBodyEl.scrollTop = st;
});
sheetHeadEl.addEventListener('click', e => {             // mouse path: click the bar/header to toggle
  if (!e.target.closest('.close')) sheet.classList.toggle('full');
});
// every open lands at the HALF detent with the content scrolled to the top
function presentSheet(){
  sheet.classList.remove('full'); sheet.style.transform = '';
  sheet.classList.add('open'); sheetOpen = true; sheetBodyEl.scrollTop = 0;
}
function relatedNodes(n){
  const out = [], seen = new Set();
  RAW.edges.forEach(e => {
    const o = e.a === n ? e.b : (e.b === n ? e.a : null);
    if (o && !seen.has(o.id)) { seen.add(o.id); out.push(o); }
  });
  return out;
}
function elm(tag, cls){ const e = document.createElement(tag); if (cls) e.className = cls; return e; }
function pillEl(txt, swatch){
  const s = elm('span','mpill');
  if (swatch){ const d = elm('span','swatch'); d.style.background = swatch; s.append(d); }
  s.append(document.createTextNode(txt));
  return s;
}
function secttlEl(txt){ const d = elm('div','secttl'); d.textContent = txt; return d; }

// node detail — Related first (compact, tappable → jump straight to that node, no back button),
// then the variable-length Summary.
function openSheet(n){
  setSelected(n, null);
  const st = document.getElementById('sTitle');
  st.textContent = n.name; st.classList.remove('cnt');    // memory names keep their original casing (serif title)
  document.getElementById('sSub').classList.remove('show');
  const body = document.getElementById('sheetBody'); body.innerHTML = '';

  const rel = relatedNodes(n);
  body.append(secttlEl('Related'));
  const r = elm('div','rel');
  rel.slice(0, 30).forEach(o => {
    const p = elm('span','pill rpill'); p.textContent = o.name;
    p.addEventListener('click', () => openSheet(o));   // jump to that node
    r.append(p);
  });
  body.append(r);

  body.append(secttlEl('Summary'));
  const sum = elm('div','summary'); sum.textContent = n.summary || '—'; body.append(sum);

  presentSheet();
  locate(n.pos, nodeFocusDist(), 1/3);   // always zoom to a consistent distance, node parked at the upper third
}

// category detail — aligned with the memory experience: the whole cluster parks at the upper
// third at a consistent (aspect-aware) distance while its node list opens in the sheet.
function openCategorySheet(cat){
  setSelected(null, cat);
  const st = document.getElementById('sTitle');
  st.textContent = `${cat.nodes.length} memories`; st.classList.add('cnt');   // Figma: sans count title…
  const sub = document.getElementById('sSub');
  sub.textContent = catLabel(cat); sub.classList.add('show');                 // …+ UPPERCASE category subtitle (i18n-aware)
  const body = document.getElementById('sheetBody'); body.innerHTML = '';

  const list = elm('div','nodelist');
  cat.nodes.slice().sort((a,b) => (b.degree||0) - (a.degree||0)).forEach(nd => {
    const row = elm('div','noderow');
    const nm = elm('span','rname'); nm.textContent = nd.name;
    const rc = elm('span','rcat');
    const deg = nd.degree != null ? nd.degree : 0;
    rc.textContent = `${deg} connection${deg === 1 ? '' : 's'}`;
    row.append(nm, rc);
    row.addEventListener('click', () => openSheet(nd));
    list.append(row);
  });
  body.append(list);

  presentSheet();
  locate(cat.pos, clusterFitDistance(), 1/3);   // whole cluster visible above the sheet, parked at the upper third
}
function closeSheet(){ sheet.classList.remove('open','full'); sheet.style.transform=''; sheetOpen=false; }   // selection (ring + lit edges) persists; cleared on zoom-out

/* ----------------------------------------------------------------------
 * 11. UI wiring
 * -------------------------------------------------------------------- */
const curSpread = 1.0, curFit = 0.5;   // fixed: spread 1.0×, initial zoom 0.5× (dev knobs removed)
let autoRotate = true;                 // fixed ON at overview (still pauses while reading/focusing)

// the old preset row now holds a category legend, filled once data loads
// dev console lives behind a DOUBLE-TAP on the top-bar title (no visible chrome for it)
{ let tbT = 0;
  document.getElementById('tbTitle').addEventListener('click', () => {
    const now = performance.now();
    if (now - tbT < 350) document.getElementById('panel').classList.toggle('hidden');
    tbT = now;
  });
}

/* ---- search (top-left) → centre the chosen node ---- */
const searchEl = document.getElementById('search');
function openSearch(){ searchEl.classList.add('open'); const i = document.getElementById('searchInput'); i.value=''; renderSearch(''); setTimeout(()=>i.focus(), 60); }
function closeSearch(){ searchEl.classList.remove('open'); }
function renderSearch(q){
  const res = document.getElementById('searchResults'); res.innerHTML = '';
  if (!RAW) return;
  q = q.trim();
  searchEl.classList.toggle('typing', q.length > 0);
  searchEl.classList.remove('stateEmpty', 'stateNone');
  if (!q){ searchEl.classList.add('stateEmpty'); return; }           // Figma: "Find a Memory" landing
  const ql = q.toLowerCase();
  const list = RAW.allNodes.filter(n => (n.name||'').toLowerCase().includes(ql))
    .sort((a,b) => (b.degree||0) - (a.degree||0)).slice(0, 60);
  if (!list.length){ searchEl.classList.add('stateNone'); return; }  // Figma: sorry + ASK VONDER
  list.forEach(n => {
    const row = elm('div','sres');
    const nm = elm('span','rname');
    const i = (n.name||'').toLowerCase().indexOf(ql);
    if (i >= 0){                                                     // matched substring in bold
      nm.append(document.createTextNode(n.name.slice(0, i)));
      const b = document.createElement('b'); b.textContent = n.name.slice(i, i + q.length); nm.append(b);
      nm.append(document.createTextNode(n.name.slice(i + q.length)));
    } else nm.textContent = n.name;
    const ct = elm('span','rcat'); ct.textContent = n._catKey ? catLabel(n._catKey) : (n.catName || '');
    row.append(nm, ct);
    row.addEventListener('click', () => { closeSearch(); openSheet(n); });
    res.append(row);
  });
}
document.getElementById('searchBtn').addEventListener('click', openSearch);
document.getElementById('searchBack').addEventListener('click', closeSearch);
document.getElementById('searchClear').addEventListener('click', () => {
  const i = document.getElementById('searchInput'); i.value = ''; renderSearch(''); i.focus();
});
document.getElementById('searchInput').addEventListener('input', e => renderSearch(e.target.value));



function rebuild(animate){
  closeSheet();
  setSelected(null, null);   // meshes/labels are about to be recreated
  const data = buildData(curSpread);
  buildGraph(data);
  applyZoomRangeAndFit(curFit, animate);
}

addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  labelRenderer.setSize(innerWidth, innerHeight);
  lineRes.set(innerWidth, innerHeight);
  if (hiLine) hiLine.material.resolution.copy(lineRes);
  if (hiBridge) hiBridge.material.resolution.copy(lineRes);
  hiOld.forEach(o => o.line.material.resolution.copy(lineRes));
  cullDirty = true;
});

/* ----------------------------------------------------------------------
 * 12. Boot — dataset tabs, load the selected source, build & run
 * -------------------------------------------------------------------- */
function buildDatasetTabs(){
  const bar = document.getElementById('datasetTabs');
  bar.innerHTML = '';
  DATASETS.forEach(ds => {
    const b = document.createElement('button');
    b.textContent = ds.label;
    if (ds.key === curDataset) b.classList.add('on');
    b.addEventListener('click', () => { if (ds.key !== curDataset) loadDataset(ds.key); });
    bar.append(b);
  });
}
function loadDataset(key){
  const ds = DATASETS.find(d => d.key === key) || DATASETS[0];
  curDataset = ds.key;
  buildDatasetTabs();
  const ld = document.getElementById('loading');
  ld.style.display = 'flex'; ld.classList.remove('err');
  const ctl = new AbortController();                       // slow network → offline hint after 15s
  const timer = setTimeout(() => ctl.abort(), 15000);
  return fetch(ds.url, { signal: ctl.signal })
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
    .then(t => {
      clearTimeout(timer);
      lastRaw = JSON.parse(t.slice(t.indexOf('{'), t.lastIndexOf('}') + 1));   // tolerate stray prefix / md fences
      RAW = parseSource(lastRaw);
      rebuild(false);
      ld.style.display = 'none';
      window._booted = true;
      runIntro();
    })
    .catch(err => { clearTimeout(timer); console.warn('load failed:', ds.url, err); ld.style.display = 'flex'; ld.classList.add('err'); });
}

window._dbg = { camera, controls, scene, openSheet, openCategorySheet, focusCategory, relatedNodes, nodeInComfortZone, runIntro, finishIntro, stepIntro, get intro(){ return intro && intro.t; }, get RAW(){ return RAW; }, get tween(){ return !!tween; }, get g2(){ return g2 && { ...g2, fingers: g2P.size }; }, set simVP(v){ simVP = v; }, get sheetPos(){ return { open: sheetOpen, full: sheet.classList.contains('full'), ty: Math.round(sheetTy()) }; },
  cat(key){ return RAW.cats.find(c => c.key === key || c.name === key); },
  get hiEdges(){ return hiLine ? hiLine.geometry.attributes.instanceStart.count : 0; },
  get hiState(){ return { pending: !!hiPending, fadeIn: +hiFadeIn.toFixed(2), old: hiOld.length, bridge: !!hiBridge,
                          op: hiLine ? +hiLine.material.opacity.toFixed(2) : 0 }; },
  get opSpread(){ const o = nodeLabels.map(it=>it.mesh.material.opacity); return { min:+Math.min(...o).toFixed(2), max:+Math.max(...o).toFixed(2) }; },
  frame(n){ for (let i=0;i<(n||60);i++){ stepTween(); stepIntro(); stepEdgeFade(); controls.update(); renderer.render(scene,camera); labelRenderer.render(scene,camera); if (!intro) maybeCull(); updateDepth(); } } };   // TEMP test hook
loadDataset(curDataset).then(() => loop());
</script>
