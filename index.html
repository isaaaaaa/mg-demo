<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0e0f12" />
<title>Vonder · Memory Graph — demos</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; min-height: 100%; background: #0e0f12; color: #e9eaf0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", Roboto, sans-serif; }
  .wrap { max-width: 460px; margin: 0 auto; padding: calc(env(safe-area-inset-top) + 40px) 20px 48px; }
  h1 { font-size: 20px; font-weight: 600; letter-spacing: -.2px; margin: 0 0 4px; }
  .sub { font-size: 13px; color: #8d90a0; margin: 0 0 28px; }
  a.card { display: block; text-decoration: none; color: inherit; margin: 0 0 12px;
    background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.10); border-radius: 14px;
    padding: 16px 18px; transition: background .15s; }
  a.card:active { background: rgba(255,255,255,.10); }
  a.card .t { font-size: 15.5px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  a.card .d { font-size: 12.5px; color: #9a9db0; margin-top: 4px; line-height: 1.45; }
  a.card .arrow { margin-left: auto; color: #6a6d80; }
  .tag { font-size: 10px; font-weight: 700; letter-spacing: .4px; text-transform: uppercase;
    color: #9aa6c4; background: rgba(125,138,168,.18); padding: 3px 7px; border-radius: 6px; }
  .foot { margin-top: 26px; font-size: 11px; color: #5a5d6e; line-height: 1.6; }
</style>
</head>
<body>
  <div class="wrap">
    <h1>Vonder · Memory Graph</h1>
    <p class="sub">交互原型 · 点开在手机上看</p>

    <a class="card" href="./vonder-memory-graph-demo.html">
      <div class="t">主线 Demo <span class="tag">current</span></div>
      <div class="d">力导向 3D 图谱，当前迭代版（节点/类别、bottom sheet、深度调暗、边高亮）</div>
    </a>
    <a class="card" href="./preview-onboarding.html">
      <div class="t">冷启动 · Onboarding</div>
      <div class="d">"记忆图谱形成中" 锁定态 + 时间轴回放（节点从少到多生长）</div>
    </a>
    <a class="card" href="./preview-demo-intro.html">
      <div class="t">开场动画 Preview</div>
      <div class="d">基于力导向图的进场动效（4 个变体切换）</div>
    </a>
    <a class="card" href="./vonder-memory-graph-planet.html">
      <div class="t">球面版 · Knowledge Planet</div>
      <div class="d">早期"知识星球"版本，留作对照</div>
    </a>

    <p class="foot">每次改动推送后，本页约 1 分钟内自动更新到最新版。<br/>需要联网（three.js 走 CDN）。</p>
  </div>
</body>
</html>
